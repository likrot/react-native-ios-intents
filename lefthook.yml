commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  commands:
    strip-dev-team:
      glob: "*.pbxproj"
      run: sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/' {staged_files} && git add {staged_files}
    typecheck:
      run: npm run typecheck
    format-fix:
      glob: "*.{js,ts,tsx}"
      run: npx prettier --write {staged_files} && git add {staged_files}

pre-push:
  commands:
    test:
      run: npm test
